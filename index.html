<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FatCat Asset Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    h1 { font-size: 3rem; margin-bottom: 1rem; font-weight: 300; letter-spacing: -0.02em; }
    .subtitle { color: #888; margin-bottom: 4rem; font-size: 1.1rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; max-width: 800px; width: 100%; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 2rem; text-decoration: none; color: inherit; transition: all 0.2s; }
    .card:hover { border-color: #666; transform: translateY(-4px); }
    .card h2 { font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 500; }
    .card p { color: #aaa; line-height: 1.6; }
    .card { cursor: pointer; }
  </style>
</head>
<body>
  <img src="logo.png" alt="FatCat" style="width:120px;height:120px;margin-bottom:2rem;border-radius:12px;">
  <h1>FatCat Asset Management</h1>
  <p class="subtitle">Parent company</p>
  <div class="cards">
        <a href="https://fatcatpm.com" class="card">
      <h2>Minimalist Built Homes</h2>
      <p>Design and construction of minimalist residential spaces.</p>
    </a>
    <a href="https://nodnews.com" class="card">
      <h2>NOD Academy</h2>
      <p>Meditation camp and deep work training programs.</p>
    </a>
    <a href="https://fatcatcruz.com" class="card">
      <h2>Gadget Designer</h2>
      <p>Physical products designed with AI.</p>
    </a>
  </div>
</body>
</html>
